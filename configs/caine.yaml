# configs/caine.yaml — A10 22GB optimized
model:
  model_id: "mistralai/Mistral-7B-Instruct-v0.3"
  torch_dtype: "float16"
  device_map: "auto"
  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
    bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./checkpoints/caine"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_seq_length: 2048
  packing: true
  fp16: true
  bf16: false
  evaluation_strategy: "steps"
  eval_steps: 50
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  seed: 42
  data_seed: 42

data:
  train_file: "./data/characters/caine_train.jsonl"
  eval_file:  "./data/characters/caine_eval.jsonl"
  test_file:  "./data/characters/caine_test.jsonl"
  train_split: 0.85
  eval_split:  0.08
  test_split:  0.07
  shuffle: true
  chat_template: "mistral"

character:
  name: "Caine"

wandb:
  project: "caine-ai"
  run_name: "qlora-caine-v1"
  tags: ["qlora", "mistral-7b", "caine", "tadc"]