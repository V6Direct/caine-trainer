# configs/bubble.yaml — smaller r due to expected small dataset
model:
  model_id: "mistralai/Mistral-7B-Instruct-v0.3"
  torch_dtype: "float16"
  device_map: "auto"
  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
    bnb_4bit_quant_type: "nf4"

lora:
  r: 8                  # smaller r — Bubble has few lines, less overfitting risk
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./checkpoints/bubble"
  num_train_epochs: 5   # more epochs to compensate for fewer samples
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_seq_length: 2048
  packing: true
  fp16: true
  bf16: false
  evaluation_strategy: "steps"
  eval_steps: 25
  logging_steps: 5
  save_strategy: "steps"
  save_steps: 25
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  seed: 42
  data_seed: 42

data:
  train_file: "./data/characters/bubble_train.jsonl"
  eval_file:  "./data/characters/bubble_eval.jsonl"
  test_file:  "./data/characters/bubble_test.jsonl"
  train_split: 0.85
  eval_split:  0.08
  test_split:  0.07
  shuffle: true
  chat_template: "mistral"

character:
  name: "Bubble"

wandb:
  project: "caine-ai"
  run_name: "qlora-bubble-v1"
  tags: ["qlora", "mistral-7b", "bubble", "tadc"]